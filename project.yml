name: NotchPrompter

options:
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0

targets:
  notch-prompter:
    type: application
    platform: macOS
    sources:
      - path: notch-prompter
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: Localizable.xcstrings
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleName: NotchPrompter
        CFBundleDisplayName: NotchPrompter
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        CFBundleIconName: AppIcon
    entitlements:
      path: Generated/notch-prompter.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchprompter.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: HotKey
